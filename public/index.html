<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0b0f1a;
  --border: #1e2d45;
  --accent: #3b82f6;
  --accent2: #06b6d4;
  --yellow: #fbbf24;
  --text: #e2e8f0;
  --muted: #64748b;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Baloo 2', 'Noto Sans Devanagari', sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(59,130,246,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(59,130,246,0.04) 1px, transparent 1px);
  background-size: 40px 40px;
  animation: gridMove 20s linear infinite;
}
@keyframes gridMove {
  0% { background-position: 0 0; }
  100% { background-position: 40px 40px; }
}

.orb { position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.15; animation: float 8s ease-in-out infinite; }
.orb1 { width: 400px; height: 400px; background: #3b82f6; top: -100px; left: -100px; }
.orb2 { width: 300px; height: 300px; background: #06b6d4; bottom: -80px; right: -80px; animation-delay: -4s; }
.orb3 { width: 200px; height: 200px; background: #fbbf24; top: 50%; left: 60%; animation-delay: -2s; }
@keyframes float {
  0%, 100% { transform: translate(0,0) scale(1); }
  50% { transform: translate(20px,-20px) scale(1.05); }
}

.card {
  position: relative; z-index: 10;
  background: rgba(17,24,39,0.85);
  backdrop-filter: blur(20px);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 48px 40px;
  max-width: 500px; width: 90%;
  text-align: center;
  box-shadow: 0 0 60px rgba(59,130,246,0.08), 0 24px 48px rgba(0,0,0,0.4);
  animation: slideUp 0.8s cubic-bezier(0.16,1,0.3,1) forwards;
  opacity: 0; transform: translateY(30px);
}
@keyframes slideUp { to { opacity:1; transform:translateY(0); } }

.gear-wrap { position:relative; width:90px; height:90px; margin:0 auto 28px; }
.gear-wrap svg { width:100%; height:100%; }
.gear-outer { animation: spinSlow 6s linear infinite; transform-origin:center; }
.gear-inner { animation: spinSlow 4s linear infinite reverse; transform-origin:center; }
@keyframes spinSlow { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
.gear-wrap::after {
  content:''; position:absolute; inset:-8px; border-radius:50%;
  border:2px solid var(--accent); opacity:0;
  animation: pulse 2s ease-out infinite;
}
@keyframes pulse {
  0% { opacity:0.6; transform:scale(0.95); }
  100% { opacity:0; transform:scale(1.2); }
}

.badge {
  display:inline-flex; align-items:center; gap:6px;
  background:rgba(251,191,36,0.1); border:1px solid rgba(251,191,36,0.25);
  color:var(--yellow); font-size:11px; font-weight:600;
  letter-spacing:0.12em; text-transform:uppercase;
  padding:5px 14px; border-radius:999px; margin-bottom:20px;
}
.badge .dot { width:6px; height:6px; background:var(--yellow); border-radius:50%; animation:blink 1.2s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

h1 { font-size:28px; font-weight:800; color:#fff; line-height:1.2; margin-bottom:12px; }
h1 span { background:linear-gradient(90deg,var(--accent),var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }

.subtitle { font-family:'Noto Sans Devanagari',sans-serif; color:var(--muted); font-size:15px; line-height:1.7; margin-bottom:32px; }

.progress-wrap { background:rgba(255,255,255,0.06); border-radius:999px; height:6px; overflow:hidden; margin-bottom:10px; }
.progress-bar { height:100%; background:linear-gradient(90deg,var(--accent),var(--accent2)); border-radius:999px; width:0%; animation:fillBar 3s cubic-bezier(0.4,0,0.2,1) 0.5s forwards; }
@keyframes fillBar { to { width:72%; } }

.progress-label { display:flex; justify-content:space-between; color:var(--muted); font-size:12px; margin-bottom:28px; }
.progress-label span:last-child { color:var(--accent2); font-weight:600; }

.divider { height:1px; background:linear-gradient(90deg,transparent,var(--border),transparent); margin-bottom:24px; }

.info { display:flex; align-items:center; justify-content:center; gap:8px; color:var(--muted); font-size:13px; }
.info svg { color:var(--accent); flex-shrink:0; }

.dots { display:flex; justify-content:center; gap:6px; margin-top:24px; }
.dots span { width:8px; height:8px; background:var(--accent); border-radius:50%; animation:bounce 1.2s ease-in-out infinite; }
.dots span:nth-child(2) { animation-delay:0.2s; background:var(--accent2); }
.dots span:nth-child(3) { animation-delay:0.4s; background:var(--yellow); }
@keyframes bounce { 0%,80%,100%{transform:scale(0.6);opacity:0.4} 40%{transform:scale(1);opacity:1} }

.site-name { margin-top:28px; font-size:12px; color:#2d3f5a; letter-spacing:0.05em; }
</style>
</head>
<body>
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>

  <div class="card">
    <div class="gear-wrap">
      <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <g class="gear-outer">
          <circle cx="50" cy="50" r="28" stroke="#3b82f6" stroke-width="4" fill="rgba(59,130,246,0.08)"/>
          <rect x="46" y="16" width="8" height="12" rx="4" fill="#3b82f6"/>
          <rect x="46" y="72" width="8" height="12" rx="4" fill="#3b82f6"/>
          <rect x="16" y="46" width="12" height="8" rx="4" fill="#3b82f6"/>
          <rect x="72" y="46" width="12" height="8" rx="4" fill="#3b82f6"/>
          <rect x="26.1" y="20.1" width="8" height="12" rx="4" fill="#3b82f6" transform="rotate(-45 30.1 26.1)"/>
          <rect x="65.9" y="20.1" width="8" height="12" rx="4" fill="#3b82f6" transform="rotate(45 70 26)"/>
          <rect x="26.1" y="67.9" width="8" height="12" rx="4" fill="#3b82f6" transform="rotate(45 30 74)"/>
          <rect x="65.9" y="67.9" width="8" height="12" rx="4" fill="#3b82f6" transform="rotate(-45 70 74)"/>
        </g>
        <g class="gear-inner">
          <circle cx="50" cy="50" r="14" stroke="#06b6d4" stroke-width="3" fill="rgba(6,182,212,0.12)"/>
          <circle cx="50" cy="50" r="5" fill="#06b6d4"/>
        </g>
      </svg>
    </div>

    <div class="badge"><span class="dot"></span>Maintenance Mode</div>

    <h1>उमरा गांव App<br/><span>Maintenance</span> पर है</h1>

    <p class="subtitle">
      हम कुछ जरूरी सुधार और नए फीचर जोड़ रहे हैं।<br/>
      जल्द ही वापस आएंगे — थोड़ा इंतज़ार करें! 🙏
    </p>

    <div class="progress-wrap"><div class="progress-bar"></div></div>
    <div class="progress-label">
      <span>काम जारी है...</span>
      <span>72% पूरा</span>
    </div>

    <div class="divider"></div>

    <div class="info">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
      </svg>
      <span>हम जल्द ही वापस आएंगे। असुविधा के लिए खेद है।</span>
    </div>

    <div class="dots"><span></span><span></span><span></span></div>
    <div class="site-name">village-umra.web.app</div>
  </div>
</body>
</html>
